version: '3.8'

services:
  db:
    image: postgres:16
    container_name: koregt-postgres
    restart: always
    environment:
      POSTGRES_USER: proy2
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: koregt
    ports:
      - "5432:5432"
    volumes:
      - ./database:/docker-entrypoint-initdb.d
      - pg-data:/var/lib/postgresql/data
    networks:
      - koregt-network

  adminer:
    image: adminer:latest
    container_name: koregt-adminer
    restart: always
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db
    depends_on:
      - db
    networks:
      - koregt-network

volumes:
  pg-data:

networks:
  koregt-network:
    driver: bridge
